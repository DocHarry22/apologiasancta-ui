<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Apologia Sancta Offline</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #171513;
      --panel: #23201d;
      --text: #f0ebe3;
      --muted: #b9b2a8;
      --accent: #d4af37;
      --border: rgba(212, 175, 55, 0.24);
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top, #2a241e, var(--bg) 60%);
      color: var(--text);
      font-family: system-ui, sans-serif;
      padding: 24px;
    }

    main {
      max-width: 440px;
      border: 1px solid var(--border);
      background: rgba(35, 32, 29, 0.95);
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.32);
    }

    h1 {
      margin: 0 0 12px;
      font-size: 1.8rem;
    }

    p {
      margin: 0 0 14px;
      color: var(--muted);
      line-height: 1.55;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 16px;
      border-radius: 999px;
      background: var(--accent);
      color: #16120c;
      text-decoration: none;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main>
    <h1>Apologia Sancta is offline</h1>
    <p>The app shell is installed, but the live engine is not reachable right now. Reconnect to the internet and reopen the live room.</p>
    <p>Your last selected room and install settings remain on this device.</p>
    <a href="/">Return Home</a>
  </main>
</body>
</html>
